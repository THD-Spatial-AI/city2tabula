<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg"><title>Undefined azimuth for near-horizontal surfaces</title><desc>Side view of a near-horizontal roof. The surface normal points almost straight up, so its vertical component is close to one and its horizontal component is close to zero, leaving the compass bearing undefined.</desc><style>
text{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.t{font-size:14px;fill:#ECEAE1}
.ts{font-size:12px;fill:#B4B2A9}
.th{font-size:14px;font-weight:500;fill:#ECEAE1}
</style>
<defs><marker id="arrowC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#F0997B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="arrowA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#EF9F27" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="300" fill="#2B2A28"/><line x1="120" y1="232" x2="600" y2="232" stroke="#73726C" stroke-width="1" stroke-dasharray="6 5" opacity="0.5"/><polygon points="210,216 442,200 442,206 210,222" fill="#B4B2A9" fill-opacity="0.16" stroke="#73726C" stroke-width="0.8"/><line x1="330" y1="208" x2="330" y2="86" stroke="#73726C" stroke-width="1" stroke-dasharray="5 4" opacity="0.6"/><line x1="330" y1="86" x2="318" y2="86" stroke="#85B7EB" stroke-width="1.5" stroke-dasharray="4 3"/><path d="M330 100 L324 100 L324 86" fill="none" stroke="#73726C" stroke-width="0.8" opacity="0.6"/><line x1="330" y1="208" x2="318" y2="88" stroke="#F0997B" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowC)"/><text class="th" x="318" y="72" text-anchor="middle">N (surface normal)</text><text class="ts" x="346" y="150" text-anchor="start">|nz| ≈ 1</text><text class="ts" x="300" y="86" text-anchor="end">(nx, ny) ≈ 0</text><text class="ts" x="210" y="252" text-anchor="start">near-horizontal roof</text><line x1="358" y1="150" x2="468" y2="150" stroke="#73726C" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/><text class="th" x="474" y="146" text-anchor="start">|nz| &gt; 0.985</text><text class="ts" x="474" y="164" text-anchor="start">azimuth returns -1</text></svg>
