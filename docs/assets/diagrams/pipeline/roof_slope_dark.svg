<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg"><title>Roof slope geometry</title><desc>Cross section of a tilted roof plane. The angle between the roof and the horizontal plane equals the angle between the surface normal and the vertical axis.</desc><style>
