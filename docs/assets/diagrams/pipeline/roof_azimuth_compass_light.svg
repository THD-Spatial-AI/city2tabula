<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg"><title>Roof azimuth as a compass bearing</title><desc>Plan view looking down on a building. The horizontal component of the surface normal is drawn as a vector, and its compass bearing measured clockwise from North is the azimuth.</desc><style>
text{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}
.t{font-size:14px;fill:#2C2C2A}
.ts{font-size:12px;fill:#5F5E5A}
.th{font-size:14px;font-weight:500;fill:#2C2C2A}
</style>
<defs><marker id="arrowC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="arrowA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="410" fill="#FFFFFF"/><circle cx="300" cy="215" r="135" fill="none" stroke="#888780" stroke-width="1"/><line x1="300" y1="80" x2="300" y2="350" stroke="#888780" stroke-width="0.8" stroke-dasharray="5 5" opacity="0.35"/><line x1="165" y1="215" x2="435" y2="215" stroke="#888780" stroke-width="0.8" stroke-dasharray="5 5" opacity="0.35"/><text class="th" x="300" y="50" text-anchor="middle">N</text><text class="ts" x="300" y="66" text-anchor="middle">0°</text><text class="th" x="300" y="374" text-anchor="middle">S</text><text class="ts" x="300" y="390" text-anchor="middle">180°</text><text class="th" x="452" y="210" text-anchor="middle">E</text><text class="ts" x="452" y="226" text-anchor="middle">90°</text><text class="th" x="150" y="210" text-anchor="middle">W</text><text class="ts" x="150" y="226" text-anchor="middle">270°</text><circle cx="300" cy="215" r="4" fill="#2C2C2A"/><line x1="300" y1="215" x2="417" y2="282" stroke="#D85A30" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowC)"/><path d="M300 157 A 58 58 0 0 1 350.2 244" fill="none" stroke="#BA7517" stroke-width="2" marker-end="url(#arrowA)"/><text class="th" x="366" y="176" text-anchor="start">azimuth = 120°</text><text class="ts" x="426" y="296" text-anchor="start">Horizontal normal</text><text class="ts" x="426" y="312" text-anchor="start">(nx, ny)</text></svg>
